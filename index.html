<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>ミムロン上司の出世への道</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="game-shell">
      <section class="stage-wrap" aria-label="ミムロン上司の出世への道">
        <canvas id="game" width="960" height="540"></canvas>
        <div class="overlay" id="overlay">
          <h1>ミムロン上司の出世への道</h1>
          <p>オフィスを駆け抜け、評価と経費と境界線を踏み越えろ。ミスすると髪が抜ける。</p>
          <button id="startButton" type="button">開始</button>
        </div>
      </section>

      <aside class="hud-panel">
        <div>
          <span class="label">ライフ</span>
          <strong id="hairCount">5</strong>
        </div>
        <div>
          <span class="label">進捗</span>
          <strong id="progressCount">0%</strong>
        </div>
        <div>
          <span class="label">悲哀</span>
          <strong id="sorrowCount">0</strong>
        </div>
        <div class="controls">
          <span>PC: ← → 移動 / Space ジャンプ</span>
          <span>スマホ: 下のボタンで操作</span>
          <span>R 再挑戦</span>
        </div>
      </aside>

      <nav class="touch-controls" aria-label="スマホ操作">
        <button class="touch-button" id="leftButton" type="button" aria-label="左へ移動">←</button>
        <button class="touch-button jump" id="jumpButton" type="button" aria-label="ジャンプ">跳</button>
        <button class="touch-button" id="rightButton" type="button" aria-label="右へ移動">→</button>
      </nav>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
