<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ミムロン上司の悲哀冒険</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="game-shell">
      <section class="stage-wrap" aria-label="ミムロン上司の悲哀冒険">
        <canvas id="game" width="960" height="540"></canvas>
        <div class="overlay" id="overlay">
          <h1>ミムロン上司の悲哀冒険</h1>
          <p>会議、締切、忖度の荒波を越えろ。ミスすると髪が抜ける。</p>
          <button id="startButton" type="button">開始</button>
        </div>
      </section>

      <aside class="hud-panel">
        <div>
          <span class="label">髪の毛</span>
          <strong id="hairCount">12</strong>
        </div>
        <div>
          <span class="label">進捗</span>
          <strong id="progressCount">0%</strong>
        </div>
        <div>
          <span class="label">悲哀</span>
          <strong id="sorrowCount">0</strong>
        </div>
        <div class="controls">
          <span>← → 移動</span>
          <span>Space / ↑ ジャンプ</span>
          <span>R 再挑戦</span>
        </div>
      </aside>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
